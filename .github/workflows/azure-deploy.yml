name: azure-deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write # required for OIDC
  contents: read

concurrency:
  group: deploy-main
  cancel-in-progress: true # avoid overlapping deploys eating F1 quota

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.x

      - name: Publish
        run: dotnet publish home-finance.csproj -c Release -o ./publish

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.AZURE_WEBAPP_NAME }}
          package: ./publish # pass the folder, sidestepping the home-finance.dll naming concern
